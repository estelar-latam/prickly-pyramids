<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prickly Pyramids</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="logo">Prickly Pyramids</h1>
      <p class="tagline">¡Construye, compite y sé el último en pie!</p>
    </header>

    <main class="main">
      <!-- MENÚ -->
      <section id="menu-screen" class="screen active">
        <div class="panel">
          <h2>Configuración</h2>
          <div class="field">
            <label>Jugadores</label>
            <div class="player-selector">
              <button class="btn btn-ghost" data-players="2">2</button>
              <button class="btn btn-ghost selected" data-players="3">3</button>
              <button class="btn btn-ghost" data-players="4">4</button>
            </div>
          </div>
          <button id="start-btn" class="btn btn-primary">Comenzar Partida</button>
        </div>
      </section>

      <!-- CARGA (pantalla completa temporal) -->
      <section id="loading-screen" class="screen loading-full">
        <div class="loading-center">
          <div class="spinner"></div>
          <p class="loading-text">Cargando partida...</p>
        </div>
      </section>

      <!-- JUEGO -->
      <section id="game-screen" class="screen">
        <div class="game-container">
          <div class="hud" id="hud"></div>
          
          <div class="game-main">
            <div class="canvas-box">
              <canvas id="game-canvas" width="860" height="620"></canvas>
            </div>
            
            <div class="side-panel">
              <div class="timer-box">
                <span>Tiempo Restante</span>
                <div id="timer" class="timer">25</div>
              </div>
              <div id="current-turn" class="turn-box"></div>
              <div class="piece-box">
                <span>Pieza Actual</span>
                <div id="current-piece"></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- RESULTADO -->
      <section id="result-screen" class="screen">
        <div class="panel result-panel">
          <h2 id="result-title"></h2>
          <p id="result-message"></p>
          <button id="restart-btn" class="btn btn-primary">Jugar de nuevo</button>
        </div>
      </section>
    </main>
  </div>

  <script src="game.js"></script>
</body>
</html>
