<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prickly Pyramids</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="logo">Prickly Pyramids</h1>
      <p class="tagline">¡Causa el colapso. Sobrevive al vacío.</p>
    </header>

    <section id="menu-screen" class="screen active">
      <div class="panel">
        <h2>Configuración</h2>
        <div class="field">
          <label>Jugadores</label>
          <div class="player-selector">
            <button class="btn btn-ghost" data-players="2">2</button>
            <button class="btn btn-ghost selected" data-players="3">3</button>
            <button class="btn btn-ghost" data-players="4">4</button>
          </div>
        </div>
        <button id="start-btn" class="btn btn-primary">Comenzar Partida</button>
      </div>
    </section>

    <section id="loading-screen" class="screen loading-full">
      <div class="loading-center">
        <div class="spinner"></div>
        <p class="loading-text">Preparando el colapso...</p>
      </div>
    </section>

    <section id="game-screen" class="screen">
      <div class="game-layout">
        <div class="hud" id="hud"></div>
        <div class="game-main">
          <div class="canvas-container">
            <canvas id="game-canvas" width="860" height="620"></canvas>
          </div>
          <div class="side-panel">
            <div class="info-box">
              <span>Tiempo</span>
              <div id="timer" class="timer-value">25</div>
            </div>
            <div class="info-box turn-box">
              <div id="current-turn"></div>
            </div>
            <div class="info-box piece-box">
              <span>Pieza</span>
              <div id="current-piece"></div>
            </div>
          </div>
        </div>
      </section>

    <section id="result-screen" class="screen">
      <div class="panel result-panel">
        <h2 id="result-title"></h2>
        <p id="result-message"></p>
        <button id="restart-btn" class="btn btn-primary">Volver al Menú</button>
      </div>
    </section>
  </div>

  <script src="game.js"></script>
</body>
</html>
